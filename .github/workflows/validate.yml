name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go-check:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Build frontend
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Verify modules
        run: go mod verify

  go-mod-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check go mod tidy
        run: go mod tidy

      - name: Verify tidy output
        run: git diff --exit-code -- go.mod go.sum

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Build frontend
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Build frontend
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      # severity/confidence とも high のみゲートする。
      # G304/G204 等の by-design 検出（ファイルブラウザ・CLI ラッパーの性質上不可避）は
      # 低 severity に分類されるためここでは対象外。誤検知は #nosec G7xx -- 理由 で注記する。
      - name: Run gosec (high severity / high confidence)
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest -quiet -severity high -confidence high ./...

  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Build frontend
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Run staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

  web-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck frontend
        run: bun run check

      - name: Build frontend
        run: bun run build

      - name: Test frontend fixtures
        run: bun run test

  third-party:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check third-party notices
        shell: pwsh
        run: .\scripts\local\check-third-party.ps1
