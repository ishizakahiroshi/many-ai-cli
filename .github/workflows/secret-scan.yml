name: secret-scan

# 実インフラ値（サーバー IP / 認証ファイル名 / 社内ホスト名 / 秘密鍵）の
# 混入を push / PR 時に gitleaks で検出して止める。設定は .gitleaks.toml。
# 個人/公開リポのため gitleaks ライセンスキーは不要。

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
