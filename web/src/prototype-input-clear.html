<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>input-clear ボタン プロトタイプ</title>
<style>
  :root {
    --bg:          #0d0f17;
    --bg-elev:     #131726;
    --line:        rgba(255,255,255,0.08);
    --line-soft:   rgba(255,255,255,0.14);
    --text:        #e2e8f0;
    --muted:       #8892b4;
    --muted-2:     #4a5278;
    --accent:      #6366f1;
    --accent-2:    #8b5cf6;
    --accent-glow: rgba(99,102,241,0.25);
  }

  /* hidden 属性が display:flex に上書きされないよう明示的に非表示にする */
  [hidden] { display: none !important; }

  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 32px;
    padding: 40px 0;
  }

  .section-label {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: -20px;
  }

  /* ---- input-bar 共通 ---- */
  .input-bar {
    display: flex;
    align-items: flex-end;
    padding: 8px 12px;
    background: var(--bg-elev);
    border-top: 1px solid var(--line);
    width: 560px;
    max-width: 96vw;
    border-radius: 12px;
  }

  .input-wrap {
    flex: 1;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    border: 1px solid var(--line-soft);
    border-radius: 10px;
    padding: 8px 10px 8px 14px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .input-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  textarea {
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    min-height: 22px;
    max-height: 160px;
    overflow-y: auto;
    width: 100%;
  }
  textarea::placeholder { color: var(--muted-2); }

  .send-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    width: 30px;
    height: 30px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.12s;
  }
  .send-btn:hover { background: var(--accent-2); }

  .input-tools {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .quick-cmd-btn {
    background: transparent;
    color: var(--muted-2);
    border: 1px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 6px;
    transition: color 0.12s, background 0.12s;
  }
  .quick-cmd-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

  /* flip ボタン */
  .tools-flip-btn {
    color: var(--muted);
    border: 1px dashed var(--line-soft);
    opacity: 0.7;
    width: 28px;
    height: 28px;
    padding: 0;
    flex-shrink: 0;
  }
  .tools-flip-btn:hover { opacity: 1; color: var(--text); }

  /* input-clear-btn 専用 */
  .input-clear-btn {
    width: 28px;
    height: 28px;
    padding: 0;
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, background 0.12s, color 0.12s;
  }
  .input-clear-btn.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .input-clear-btn:hover {
    background: rgba(239,68,68,0.15);
    color: #f87171;
  }

  /* ---- flip トグルボタン（プロトタイプ用） ---- */
  #flip-toggle {
    background: rgba(99,102,241,0.15);
    color: var(--accent-text, #a5b4fc);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 6px 18px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.12s;
  }
  #flip-toggle:hover { background: rgba(99,102,241,0.28); }

  /* ---- 説明 ---- */
  .note {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.8;
    text-align: center;
    max-width: 500px;
  }
  .note code {
    background: rgba(255,255,255,0.07);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: monospace;
    color: var(--text);
  }
</style>
</head>
<body>

<button id="flip-toggle">⇄ ツールを左右切替</button>

<!-- ===== RIGHT (デフォルト) ===== -->
<p class="section-label" id="pos-label">ツール: 右側（デフォルト）</p>

<div class="input-bar">
  <div class="input-wrap" id="input-wrap">

    <!-- 左側に来る要素群（right 時は末尾へ移動） -->
    <button class="quick-cmd-btn tools-flip-btn" id="tools-flip-btn" title="ツールを左右切替">⇄</button>

    <div class="input-area">
      <textarea id="input" rows="1" placeholder="メッセージを入力..."></textarea>
    </div>

    <!-- 入力クリアボタン: ➤ の左隣に常に置く（左右レイアウト共通） -->
    <button class="quick-cmd-btn input-clear-btn" id="input-clear-btn" title="入力をクリア" aria-label="入力をクリア">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="2" y1="2" x2="11" y2="11"/>
        <line x1="11" y1="2" x2="2" y2="11"/>
      </svg>
    </button>

    <button class="send-btn" title="Send">➤</button>

    <!-- 🎤 音声入力ボタン（send-btn の右隣） -->
    <button class="quick-cmd-btn" id="voice-btn" title="音声入力">🎤</button>

    <div class="input-tools" id="input-tools">
      <!-- 🎧 集音機能停止中のため hidden。復活時は hidden を外す -->
      <button class="quick-cmd-btn" id="voice-wakeword-btn" hidden>🎧</button>

      <button class="quick-cmd-btn" title="会話をクリア">/clear</button>
      <button class="quick-cmd-btn" title="モデル切替">/model</button>
      <button class="quick-cmd-btn" title="スラッシュコマンド">/ ▾</button>
    </div>

  </div>
</div>

<p class="note" id="layout-note">
  <code>[input area]</code> <code>➤</code> <code>✕</code> <code>/clear</code> <code>/model</code> <code>/ ▾</code> <code>⇄</code>
</p>

<script>
  const inp        = document.getElementById('input');
  const clearBtn   = document.getElementById('input-clear-btn');
  const wrap       = document.getElementById('input-wrap');
  const flipBtn    = document.getElementById('tools-flip-btn');
  const inputArea  = wrap.querySelector('.input-area');
  const sendBtn    = wrap.querySelector('.send-btn');
  const voiceBtn   = document.getElementById('voice-btn');
  const inputTools = document.getElementById('input-tools');

  const posLabel   = document.getElementById('pos-label');
  const layoutNote = document.getElementById('layout-note');
  const flipToggle = document.getElementById('flip-toggle');

  // ----- textarea 高さ調整 -----
  function resizeTextarea() {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 160) + 'px';
  }

  // ----- クリアボタン表示制御 -----
  function updateClearBtn() {
    clearBtn.classList.toggle('visible', inp.value.length > 0);
  }

  inp.addEventListener('input', () => { resizeTextarea(); updateClearBtn(); });

  clearBtn.addEventListener('click', () => {
    inp.value = '';
    resizeTextarea();
    updateClearBtn();
    inp.focus();
  });

  // ----- 左右切替（app.js の applyToolsPosition を再現） -----
  // clearBtn は常に sendBtn の直前（左隣）に置く
  let isLeft = false;

  function applyToolsPosition(left) {
    isLeft = left;
    if (left) {
      // 左: ⇄ → input-tools → 🎤 → ✕ → ➤ → input-area
      wrap.append(flipBtn, inputTools, voiceBtn, clearBtn, sendBtn, inputArea);
      posLabel.textContent = 'ツール: 左側';
      layoutNote.innerHTML =
        '<code>⇄</code> <code>/clear</code> <code>/model</code> <code>/ ▾</code> <code>🎤</code> <code>✕</code> <code>➤</code> <code>[input area]</code>';
    } else {
      // 右: input-area → ✕ → ➤ → 🎤 → input-tools → ⇄
      wrap.append(inputArea, clearBtn, sendBtn, voiceBtn, inputTools, flipBtn);
      posLabel.textContent = 'ツール: 右側（デフォルト）';
      layoutNote.innerHTML =
        '<code>[input area]</code> <code>✕</code> <code>➤</code> <code>🎤</code> <code>/clear</code> <code>/model</code> <code>/ ▾</code> <code>⇄</code>';
    }
  }

  // 初期: 右
  applyToolsPosition(false);

  flipToggle.addEventListener('click', () => applyToolsPosition(!isLeft));
  flipBtn.addEventListener('click',    () => applyToolsPosition(!isLeft));
</script>
</body>
</html>
