<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>input-tools 左右切替モック v3</title>
<style>
  body {
    background: #0d0f17;
    color: #e2e8f0;
    font-family: sans-serif;
    padding: 40px;
  }
  h2 { font-size: 14px; color: #8892b4; margin: 24px 0 8px; }

  .input-bar {
    background: #131726;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 8px 12px;
  }
  .input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #0d0f17;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 12px;
    padding: 8px 10px;
  }
  .input-area {
    flex: 1;
    min-width: 0;
  }
  .input-area textarea {
    width: 100%;
    background: transparent;
    border: 0;
    color: #e2e8f0;
    resize: none;
    outline: none;
    font-size: 14px;
  }
  .other-tools {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .input-wrap button {
    background: transparent;
    border: 0;
    color: #e2e8f0;
    font-size: 16px;
    padding: 6px 8px;
    cursor: pointer;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .input-wrap button:hover { background: rgba(255,255,255,0.08); }
  .send-btn {
    background: #6366f1 !important;
    color: white !important;
  }
  .quick {
    font-size: 12px !important;
    border: 1px solid rgba(255,255,255,0.14) !important;
  }
  .tools-flip {
    color: #8892b4 !important;
    font-size: 14px !important;
    border: 1px dashed rgba(255,255,255,0.2) !important;
  }

  /* ============================================================
     ★ flex order だけで配置を切り替え (DOM 構造はそのまま)
     ============================================================ */

  /* DOM: flip → input-area → send → other-tools */

  /* デフォルト (右側モード):
     [input-area (grows)] [⇄] [➤] [🎤 🎧 /clear /model / ▾]            */
  .input-wrap .input-area  { order: 1; }
  .input-wrap .tools-flip  { order: 2; }
  .input-wrap .send-btn    { order: 3; }
  .input-wrap .other-tools { order: 4; }

  /* 左側モード:
     [⇄] [🎤 🎧 /clear /model / ▾] [input-area (grows)] [➤]           */
  .input-wrap.tools-left .tools-flip  { order: 1; }
  .input-wrap.tools-left .other-tools { order: 2; }
  .input-wrap.tools-left .input-area  { order: 3; }
  .input-wrap.tools-left .send-btn    { order: 4; }

  .state {
    color: #a5b4fc;
    font-size: 12px;
    margin-bottom: 6px;
    font-family: monospace;
  }
</style>
</head>
<body>

<h2>1 つの入力バーをトグル (実際の挙動)</h2>
<div class="state" id="state">状態: ツール=右側 (デフォルト)</div>
<div class="input-bar">
  <div class="input-wrap" id="wrap">
    <button class="tools-flip" onclick="flip()" title="左右を入れ替え">⇄</button>
    <div class="input-area">
      <textarea rows="1">ここに入力した文字も一緒に移動します</textarea>
    </div>
    <button class="send-btn" title="Send">➤</button>
    <div class="other-tools">
      <button title="Voice">🎤</button>
      <button title="Wakeword">🎧</button>
      <button class="quick">/clear</button>
      <button class="quick">/model</button>
      <button class="quick">/ ▾</button>
    </div>
  </div>
</div>

<h2>比較 (静止状態)</h2>

<div class="state">右側 (デフォルト) — 送信ボタンはツール群の中に</div>
<div class="input-bar">
  <div class="input-wrap">
    <button class="tools-flip" title="左右を入れ替え">⇄</button>
    <div class="input-area">
      <textarea rows="1">入力エリア左、ツール群＋送信ボタン右</textarea>
    </div>
    <button class="send-btn" title="Send">➤</button>
    <div class="other-tools">
      <button title="Voice">🎤</button>
      <button title="Wakeword">🎧</button>
      <button class="quick">/clear</button>
      <button class="quick">/model</button>
      <button class="quick">/ ▾</button>
    </div>
  </div>
</div>

<div class="state" style="margin-top:12px;">左側 (.tools-left 付与) — 送信ボタンだけ一番右に分離</div>
<div class="input-bar">
  <div class="input-wrap tools-left">
    <button class="tools-flip" title="左右を入れ替え">⇄</button>
    <div class="input-area">
      <textarea rows="1">ツール群＝左 / 入力エリア＝中央 / 送信ボタン＝最右</textarea>
    </div>
    <button class="send-btn" title="Send">➤</button>
    <div class="other-tools">
      <button title="Voice">🎤</button>
      <button title="Wakeword">🎧</button>
      <button class="quick">/clear</button>
      <button class="quick">/model</button>
      <button class="quick">/ ▾</button>
    </div>
  </div>
</div>

<p style="color:#8892b4; font-size:12px; margin-top:24px; line-height:1.6;">
  ※ 送信ボタンを <code>.other-tools</code> から外して独立した sibling にしたのがポイント。<br>
  ※ デフォルト時は <code>order: 3</code> でツール群の手前に並び、左モード時は <code>order: 4</code> で最右へ。<br>
  ※ DOM 構造は同じ・<code>flex order</code> だけで切り替えるので textarea のフォーカス・カーソル・入力中文字は維持。
</p>

<script>
  const wrap = document.getElementById('wrap');
  const state = document.getElementById('state');
  function flip() {
    wrap.classList.toggle('tools-left');
    const isLeft = wrap.classList.contains('tools-left');
    state.textContent = '状態: ツール=' + (isLeft ? '左側 (送信ボタンは最右に分離)' : '右側 (デフォルト)');
  }
</script>

</body>
</html>
