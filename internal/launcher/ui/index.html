<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",sans-serif;font-size:14px;background:#f0f2f5;color:#222;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 16px}
.launcher-header{width:100%;max-width:760px;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px}
.launcher-brand{display:inline-flex;align-items:center;gap:10px;font-size:21px;font-weight:700;letter-spacing:.06em;color:#1a1a2e}
.launcher-brand-icon{width:34px;height:34px;border-radius:8px;display:block;flex-shrink:0}
.lang-control{display:flex;align-items:center;gap:8px;color:#555;font-size:12px}
.lang-control select{height:30px;border:1px solid #d0d7de;border-radius:4px;background:#fff;color:#222;font-size:13px;padding:3px 8px}
.card{background:#fff;border:1px solid #d0d7de;border-radius:6px;padding:16px;width:100%;max-width:760px;margin-bottom:12px}
.card h2{font-size:14px;font-weight:600;margin-bottom:10px;color:#444}
/* table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f6f8fa;text-align:left;padding:6px 8px;border-bottom:1px solid #d0d7de;font-weight:600;color:#555}
td{padding:6px 8px;border-bottom:1px solid #eef0f2}
tr:last-child td{border-bottom:none}
tr.selected td{background:#dbeafe}
tr:hover td{background:#f6f8fa;cursor:pointer}
/* buttons */
.toolbar{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
button{padding:5px 14px;border:1px solid #d0d7de;border-radius:4px;background:#f6f8fa;cursor:pointer;font-size:13px;color:#333}
button:hover{background:#e8ecf0}
button.primary{background:#0969da;color:#fff;border-color:#0969da}
button.primary:hover{background:#0860ca}
button.danger{background:#cf222e;color:#fff;border-color:#cf222e}
button.danger:hover{background:#a40e26}
button:disabled{opacity:.5;cursor:not-allowed}
/* form */
.form-grid{display:grid;grid-template-columns:140px 1fr;gap:8px 12px;align-items:center}
.form-grid label{text-align:right;font-size:13px;color:#555}
.form-grid input,.form-grid select{padding:5px 8px;border:1px solid #d0d7de;border-radius:4px;font-size:13px;width:100%}
.form-grid .hint{grid-column:2;font-size:11px;color:#888;margin-top:-4px}
.form-section{border-top:1px solid #eef0f2;padding-top:10px;margin-top:10px}
.form-section h3{font-size:13px;font-weight:600;color:#555;margin-bottom:8px}
/* running badge */
.badge-running{display:inline-flex;align-items:center;gap:4px;color:#15803d;font-weight:600;font-size:12px;white-space:nowrap}
.badge-running::before{content:"●";font-size:10px}
.badge-idle{color:#999;font-size:12px}
/* status */
#status-bar{width:100%;max-width:760px;padding:8px 12px;border-radius:4px;font-size:13px;display:none}
#status-bar.info{background:#dbeafe;color:#1d4ed8;display:block}
#status-bar.error{background:#fee2e2;color:#b91c1c;display:block}
#status-bar.success{background:#dcfce7;color:#15803d;display:block}
/* modal overlay */
#modal-overlay,#stop-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
#modal-overlay.open,#stop-modal-overlay.open{display:flex}
#modal-box,#stop-modal-box{background:#fff;border-radius:8px;padding:20px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;border:1px solid #d0d7de}
#modal-box h2,#stop-modal-box h2{margin-bottom:14px;font-size:15px}
#modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.btn-stop-row{padding:4px 10px;font-size:12px}
.stop-options{display:flex;flex-direction:column;gap:8px}
.stop-option{display:block;width:100%;padding:10px 12px;text-align:left;background:#fff}
.stop-option:hover{background:#f6f8fa}
.stop-option.danger{border-color:#cf222e;color:#24292f;background:#fff}
.stop-option.danger:hover{background:#fff5f5}
.stop-label{display:block;font-weight:600;margin-bottom:3px}
.stop-desc{display:block;font-size:12px;color:#666;line-height:1.35}
#stop-modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
@media (max-width:560px){.launcher-header{align-items:flex-start;flex-direction:column}.lang-control{align-self:flex-end}}
</style>

<body>
<header class="launcher-header">
  <h1 class="launcher-brand" aria-label="MANY-AI-CLI">
    <svg class="launcher-brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" aria-hidden="true">
      <rect width="512" height="512" rx="104" fill="#111111"/>
      <rect x="78" y="112" width="356" height="278" rx="34" fill="#1A1A1A" stroke="#FFD600" stroke-width="16"/>
      <circle cx="132" cy="158" r="11" fill="#FFD600"/>
      <circle cx="166" cy="158" r="11" fill="#FFD600"/>
      <circle cx="200" cy="158" r="11" fill="#FFD600"/>
      <line x1="88" y1="196" x2="424" y2="196" stroke="#3A3A3A" stroke-width="6"/>
      <text x="256" y="318" text-anchor="middle" font-family="Consolas, Menlo, Monaco, monospace" font-size="116" font-weight="900" fill="#FFFFFF" letter-spacing="-6">CLI</text>
      <g stroke="#FFD600" stroke-width="9" fill="none" stroke-linecap="round">
        <circle cx="132" cy="424" r="16" fill="#111111"/>
        <circle cx="256" cy="424" r="16" fill="#111111"/>
        <circle cx="380" cy="424" r="16" fill="#111111"/>
        <path d="M148 424 H240 M272 424 H364"/>
      </g>
    </svg>
    <span>MANY-AI-CLI</span>
  </h1>
  <div class="lang-control">
    <label for="lang-select" data-i18n="language_label">Language</label>
    <select id="lang-select" aria-label="Language" data-i18n-aria-label="language_label">
      <option value="en">English</option>
      <option value="ja">日本語</option>
    </select>
  </div>
</header>

<div id="status-bar"></div>

<div class="card">
  <h2 data-i18n="connections_title">Connections</h2>
  <table id="profile-table">
    <thead>
      <tr><th data-i18n="th_name">Name</th><th data-i18n="th_type">Type</th><th data-i18n="th_destination">Destination</th><th data-i18n="th_hub_port">Hub port</th><th data-i18n="th_status">Status</th><th data-i18n="th_actions">Actions</th></tr>
    </thead>
    <tbody id="profile-tbody">
      <tr><td colspan="6" style="color:#888;text-align:center" data-i18n="loading">Loading...</td></tr>
    </tbody>
  </table>
  <div class="toolbar">
    <button id="btn-connect" class="primary" disabled data-i18n="btn_connect">Connect</button>
    <button id="btn-reconnect" style="display:none" data-i18n="btn_reconnect">Reconnect</button>
    <button id="btn-new" data-i18n="btn_new">New</button>
    <button id="btn-edit" disabled data-i18n="btn_edit">Edit</button>
    <button id="btn-delete" class="danger" disabled data-i18n="btn_delete">Delete</button>
  </div>
</div>

<!-- edit/new modal -->
<div id="modal-overlay">
  <div id="modal-box">
    <h2 id="modal-title">New profile</h2>
    <div class="form-grid">
      <label for="f-name" data-i18n="label_name_required">Name *</label>
      <input id="f-name" type="text" placeholder="e.g. my-vps" data-i18n-placeholder="ph_name">
      <label for="f-type" data-i18n="label_type_required">Type *</label>
      <select id="f-type">
        <option value="wsl">WSL</option>
        <option value="ssh">SSH</option>
      </select>

      <!-- WSL section -->
      <div id="sec-wsl" class="form-section" style="grid-column:1/3">
        <h3 data-i18n="wsl_settings">WSL settings</h3>
        <div class="form-grid">
          <label for="f-distro" data-i18n="label_distro">Distro</label>
          <input id="f-distro" type="text" placeholder="e.g. Ubuntu (blank = default)" data-i18n-placeholder="ph_distro">
          <label for="f-wsl-binary" data-i18n="label_binary">Binary</label>
          <input id="f-wsl-binary" type="text" placeholder="many-ai-cli (blank = default)" data-i18n-placeholder="ph_binary">
          <label for="f-wsl-cwd" data-i18n="label_cwd">Working directory</label>
          <input id="f-wsl-cwd" type="text" placeholder="e.g. ~/projects (blank = ~)" data-i18n-placeholder="ph_cwd">
          <label for="f-wsl-hubport" data-i18n="label_hub_port">Hub port</label>
          <input id="f-wsl-hubport" type="number" min="1" max="65535" placeholder="0 = auto-select" data-i18n-placeholder="ph_hub_port_auto">
        </div>
      </div>

      <!-- SSH section -->
      <div id="sec-ssh" class="form-section" style="grid-column:1/3;display:none">
        <h3 data-i18n="ssh_settings">SSH settings</h3>
        <div class="form-grid">
          <label for="f-ssh-mode" data-i18n="label_mode_required">Mode *</label>
          <select id="f-ssh-mode">
            <option value="serve" data-i18n="mode_serve">serve (start Hub remotely)</option>
            <option value="tunnel" data-i18n="mode_tunnel">tunnel (forward to existing Hub)</option>
          </select>
          <label for="f-host" data-i18n="label_host_required">Host *</label>
          <input id="f-host" type="text" placeholder="e.g. myserver.example.com" data-i18n-placeholder="ph_host">
          <label for="f-user" data-i18n="label_user">User</label>
          <input id="f-user" type="text" placeholder="e.g. ubuntu (blank = SSH default)" data-i18n-placeholder="ph_user">
          <label for="f-ssh-port" data-i18n="label_ssh_port">SSH port</label>
          <input id="f-ssh-port" type="number" min="1" max="65535" placeholder="22 (blank = default)" data-i18n-placeholder="ph_ssh_port">
          <label for="f-identity" data-i18n="label_identity">Identity file</label>
          <input id="f-identity" type="text" placeholder="e.g. ~/.ssh/id_ed25519 (blank = default)" data-i18n-placeholder="ph_identity">
          <label for="f-ssh-hubport" data-i18n="label_hub_port">Hub port</label>
          <input id="f-ssh-hubport" type="number" min="1" max="65535" placeholder="serve = 0 (auto) / tunnel = required" data-i18n-placeholder="ph_ssh_hub_port">
          <!-- serve-only -->
          <div id="sec-ssh-serve" style="grid-column:1/3">
            <div class="form-grid">
              <label for="f-ssh-binary" data-i18n="label_binary">Binary</label>
              <input id="f-ssh-binary" type="text" placeholder="many-ai-cli (blank = default)" data-i18n-placeholder="ph_binary">
              <label for="f-ssh-cwd" data-i18n="label_cwd">Working directory</label>
              <input id="f-ssh-cwd" type="text" placeholder="e.g. ~/projects (blank = ~)" data-i18n-placeholder="ph_cwd">
            </div>
          </div>
          <!-- tunnel-only -->
          <div id="sec-ssh-tunnel" style="grid-column:1/3;display:none">
            <div class="form-grid">
              <label for="f-token-cmd" data-i18n="label_token_command_required">token_command *</label>
              <input id="f-token-cmd" type="text" placeholder="e.g. cat ~/.many-ai-cli/config.yaml | grep token | awk '{print $2}'" data-i18n-placeholder="ph_token_command">
              <span class="hint" data-i18n="token_command_hint">Runs remotely over SSH and returns the token on stdout.</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="modal-footer">
      <button id="btn-modal-cancel" data-i18n="btn_cancel">Cancel</button>
      <button id="btn-modal-save" class="primary" data-i18n="btn_save">Save</button>
    </div>
  </div>
</div>

<!-- stop modal -->
<div id="stop-modal-overlay">
  <div id="stop-modal-box">
    <h2 id="stop-modal-title">Stop connection</h2>
    <div id="stop-options" class="stop-options"></div>
    <div id="stop-modal-footer">
      <button id="btn-stop-cancel" data-i18n="btn_cancel">Cancel</button>
    </div>
  </div>
</div>

    error_connect_timeout: '接続がタイムアウトしました',
    error_connect_failed: '接続に失敗しました: {message}',
    error_stop_failed: '停止に失敗しました: {message}',
    confirm_delete: '「{name}」を削除しますか?',
    error_delete_failed: '削除に失敗しました: {message}',
    alert_name_required: '名前は必須です',
    alert_host_required: 'SSH ホストは必須です',
    alert_token_required: 'tunnel モードでは token_command は必須です',
    alert_tunnel_port_required: 'tunnel モードでは Hub ポートは必須です',
    alert_save_failed: '保存に失敗しました: {message}',
  },
};

let profiles = [];
let lastUsed = '';
let activeMap = {};   // profile name -> hub_url（検証済みの稼働中接続）
let activeInfoMap = {}; // profile name -> active entry（owned 判定用）
let selectedIdx = -1; // index in profiles[]
let editingIdx = -1;  // -1 = new, >=0 = editing
let stopProfile = null;
let currentLang = normalizeLang(readStoredLang()) || 'en';

function normalizeLang(lang) {
  const normalized = String(lang || '').toLowerCase();
  return SUPPORTED_LANGS.includes(normalized) ? normalized : '';
}

function readStoredLang() {
  try {
    const stored = localStorage.getItem(LANG_STORAGE_KEY);
    if (normalizeLang(stored)) return stored;
  } catch (_) {}
  const cookie = document.cookie.split('; ').find(row => row.startsWith(LANG_COOKIE_KEY + '='));
  return cookie ? decodeURIComponent(cookie.split('=').slice(1).join('=')) : '';
}

function writeStoredLang(lang) {
  try {
    localStorage.setItem(LANG_STORAGE_KEY, lang);
  } catch (_) {}
  document.cookie = LANG_COOKIE_KEY + '=' + encodeURIComponent(lang) + '; Max-Age=31536000; Path=/; SameSite=Lax';
}

function t(key, vars = {}) {
  const dict = I18N[currentLang] || I18N.en;
  let msg = dict[key] || I18N.en[key] || key;
  return msg.replace(/\{([a-zA-Z0-9_]+)\}/g, (_, name) => Object.prototype.hasOwnProperty.call(vars, name) ? String(vars[name]) : '');
}

function applyI18n() {
  document.documentElement.lang = currentLang;
  document.title = t('doc_title');
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.dataset.i18nPlaceholder); });
  document.querySelectorAll('[data-i18n-aria-label]').forEach(el => { el.setAttribute('aria-label', t(el.dataset.i18nAriaLabel)); });
  const langSelect = document.getElementById('lang-select');
  if (langSelect) langSelect.value = currentLang;
  updateModalTitle();
  updateButtons();
  if (stopProfile) {
    const idx = profiles.findIndex(p => p.name === stopProfile.name);
    if (idx >= 0) openStopModal(idx);
  }
}

function setLanguage(lang) {
  currentLang = normalizeLang(lang) || 'en';
  writeStoredLang(currentLang);
  applyI18n();
  renderTable();
}

function updateModalTitle() {
  const title = document.getElementById('modal-title');
  if (!title) return;
  title.textContent = editingIdx < 0 ? t('modal_new') : t('modal_edit');
}

// --------------------------------------------------------------------------
// API helpers
// --------------------------------------------------------------------------
async function apiFetch(path, opts = {}) {
  const sep = path.includes('?') ? '&' : '?';
  const url = path + sep + 'token=' + encodeURIComponent(token);
  const res = await fetch(url, {
    headers: {'Content-Type': 'application/json', ...(opts.headers || {})},
    ...opts,
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || t('unknown_error'));
  return data;
}

// --------------------------------------------------------------------------
// Status bar
// --------------------------------------------------------------------------
function showStatus(msg, type = 'info') {
  const bar = document.getElementById('status-bar');
  bar.textContent = msg;
  bar.className = type;
}
function hideStatus() {
  document.getElementById('status-bar').className = '';
}

// --------------------------------------------------------------------------
// Load and render profiles
// --------------------------------------------------------------------------
async function loadProfiles() {
  try {
    const data = await apiFetch('/api/profiles');
    profiles = data.profiles || [];
    lastUsed = data.last_used || '';
    activeMap = {};
    activeInfoMap = {};
    (data.active || []).forEach(a => {
      activeMap[a.profile] = a.hub_url;
      activeInfoMap[a.profile] = a;
    });
    renderTable();
  } catch (e) {
    showStatus(t('error_load_profiles', {message: e.message}), 'error');
  }
}

function renderTable() {
  const tbody = document.getElementById('profile-tbody');
  if (profiles.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="color:#888;text-align:center">' + esc(t('no_profiles')) + '</td></tr>';
    selectedIdx = -1;
    updateButtons();
    return;
  }
  tbody.innerHTML = '';
  profiles.forEach((p, i) => {
    const tr = document.createElement('tr');
    if (i === selectedIdx) tr.classList.add('selected');
    const dest = p.type === 'wsl'
      ? (p.distro || t('default_distro'))
      : ((p.user ? p.user + '@' : '') + (p.host || '?'));
    // SSH は接続モード（serve/tunnel）も併記する。mode 未設定は Go 側
    // （validateSSH）の既定に合わせて serve とみなす。
    const typeCell = p.type === 'ssh' ? p.type + ' (' + (p.mode || 'serve') + ')' : p.type;
    const hubPort = p.hub_port || t('auto');
    const nameCell = p.name + (p.name === lastUsed ? ' ★' : '');
    const stateCell = activeMap[p.name]
      ? '<span class="badge-running">' + esc(t('state_connected')) + '</span>'
      : '<span class="badge-idle">' + esc(t('state_idle')) + '</span>';
    const actionCell = activeMap[p.name]
      ? '<button type="button" class="danger btn-stop-row" data-index="' + i + '">' + esc(t('btn_stop')) + '</button>'
      : '';
    tr.innerHTML = `<td>${esc(nameCell)}</td><td>${esc(typeCell)}</td><td>${esc(dest)}</td><td>${esc(String(hubPort))}</td><td>${stateCell}</td><td>${actionCell}</td>`;
    tr.addEventListener('click', () => { selectedIdx = i; renderTable(); });
    tr.addEventListener('dblclick', () => { selectedIdx = i; renderTable(); startConnect(); });
    const stopBtn = tr.querySelector('.btn-stop-row');
    if (stopBtn) {
      stopBtn.addEventListener('click', e => {
        e.stopPropagation();
        selectedIdx = Number(stopBtn.dataset.index);
        renderTable();
        openStopModal(selectedIdx);
      });
    }
    tbody.appendChild(tr);
  });
  updateButtons();
}

function updateButtons() {
  const sel = selectedIdx >= 0;
  const running = sel && !!activeMap[profiles[selectedIdx].name];
  const btnConnect = document.getElementById('btn-connect');
  btnConnect.disabled = !sel;
  // 稼働中プロファイルは既存接続をそのまま開く（重複接続を張らない）。
  btnConnect.textContent = running ? t('btn_open') : t('btn_connect');
  document.getElementById('btn-reconnect').style.display = running ? '' : 'none';
  document.getElementById('btn-edit').disabled = !sel;
  document.getElementById('btn-delete').disabled = !sel;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// --------------------------------------------------------------------------
// Connect flow
// --------------------------------------------------------------------------
async function startConnect() {
  if (selectedIdx < 0) return;
  const p = profiles[selectedIdx];
  // 稼働中なら新規接続せず既存の Hub URL を開く。
  if (activeMap[p.name]) {
    showStatus(t('status_open_existing', {name: p.name}), 'success');
    location.href = activeMap[p.name];
    return;
  }
  await reconnect();
}

// reconnect always establishes a new connection (server side tears down a
// same-name connection it owns first).
async function reconnect() {
  if (selectedIdx < 0) return;
  const p = profiles[selectedIdx];
  showStatus(t('status_connecting', {name: p.name}), 'info');
  document.getElementById('btn-connect').disabled = true;

  try {
    await apiFetch('/api/connect', {
      method: 'POST',
      body: JSON.stringify({name: p.name}),
    });
  } catch (e) {
    showStatus(t('error_connect_start', {message: e.message}), 'error');
    document.getElementById('btn-connect').disabled = false;
    return;
  }

  // Poll for result.
  let tries = 0;
  const maxTries = 150; // 150 * 800ms = 2 min
  const timer = setInterval(async () => {
    tries++;
    if (tries > maxTries) {
      clearInterval(timer);
      showStatus(t('error_connect_timeout'), 'error');
      document.getElementById('btn-connect').disabled = false;
      return;
    }
    try {
      const st = await apiFetch('/api/connect/status');
      if (st.status === 'connected') {
        clearInterval(timer);
        showStatus(t('status_connected_redirect'), 'success');
        lastUsed = p.name;
        setTimeout(() => { location.href = st.hub_url; }, 600);
      } else if (st.status === 'error') {
        clearInterval(timer);
        showStatus(t('error_connect_failed', {message: st.error || t('unknown_error')}), 'error');
        document.getElementById('btn-connect').disabled = false;
      }
      // 'connecting' → keep polling
    } catch (e) {
      // Transient fetch error — keep polling
    }
  }, 800);
}

// --------------------------------------------------------------------------
// Stop flow
// --------------------------------------------------------------------------
function openStopModal(idx) {
  if (idx < 0 || idx >= profiles.length) return;
  const p = profiles[idx];
  const active = activeInfoMap[p.name];
  if (!active) return;

  stopProfile = p;
  document.getElementById('stop-modal-title').textContent = t('modal_stop_title', {name: p.name});
  const optionsEl = document.getElementById('stop-options');
  optionsEl.innerHTML = '';

  const options = [
    {mode: 'all', label: 'stop_all_label', desc: 'stop_all_desc', danger: true},
    {mode: 'web', label: 'stop_web_label', desc: 'stop_web_desc', danger: false},
  ];
  if (isTunnelProfile(p)) {
    options.push({
      mode: 'disconnect',
      label: 'stop_disconnect_label',
      desc: 'stop_disconnect_desc',
      danger: false,
      disabled: active.owned === false,
      title: active.owned === false ? t('stop_disconnect_unowned') : '',
    });
  }

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'stop-option' + (opt.danger ? ' danger' : '');
    btn.dataset.mode = opt.mode;
    btn.disabled = !!opt.disabled;
    if (opt.title) btn.title = opt.title;
    btn.innerHTML = '<span class="stop-label">' + esc(t(opt.label)) + '</span>' +
      '<span class="stop-desc">' + esc(t(opt.desc)) + (opt.title ? ' ' + esc(opt.title) : '') + '</span>';
    btn.addEventListener('click', () => stopConnection(opt.mode));
    optionsEl.appendChild(btn);
  });

  document.getElementById('stop-modal-overlay').classList.add('open');
}

function closeStopModal() {
  document.getElementById('stop-modal-overlay').classList.remove('open');
  stopProfile = null;
}

function isAnyModalOpen() {
  return document.getElementById('modal-overlay').classList.contains('open') ||
    document.getElementById('stop-modal-overlay').classList.contains('open');
}

function isTunnelProfile(p) {
  return p && p.type === 'ssh' && (p.mode || 'serve') === 'tunnel';
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function stopConnection(mode) {
  const p = stopProfile;
  if (!p) return;
  closeStopModal();
  showStatus(t('status_stopping', {name: p.name}), 'info');

  try {
    await apiFetch('/api/disconnect', {
      method: 'POST',
      body: JSON.stringify({name: p.name, mode}),
    });
    delete activeMap[p.name];
    delete activeInfoMap[p.name];
    renderTable();
    showStatus(t('status_stopped', {name: p.name}), 'success');
  } catch (e) {
    showStatus(t('error_stop_failed', {message: e.message}), 'error');
  } finally {
    await sleep(1000);
    await loadProfiles();
  }
}

// --------------------------------------------------------------------------
// Delete
// --------------------------------------------------------------------------
async function deleteSelected() {
  if (selectedIdx < 0) return;
  const p = profiles[selectedIdx];
  if (!confirm(t('confirm_delete', {name: p.name}))) return;
  const newList = profiles.filter((_, i) => i !== selectedIdx);
  try {
    await apiFetch('/api/profiles', {
      method: 'POST',
      body: JSON.stringify({profiles: newList}),
    });
    selectedIdx = -1;
    await loadProfiles();
  } catch (e) {
    showStatus(t('error_delete_failed', {message: e.message}), 'error');
  }
}

// --------------------------------------------------------------------------
// Modal open/close
// --------------------------------------------------------------------------
function openModal(idx) {
  editingIdx = idx;
  const isNew = idx < 0;
  updateModalTitle();

  const p = isNew ? {} : profiles[idx];

  setVal('f-name', p.name || '');
  setVal('f-type', p.type || 'wsl');
  setVal('f-distro', p.distro || '');
  setVal('f-wsl-binary', p.binary || '');
  setVal('f-wsl-cwd', p.cwd || '');
  setVal('f-wsl-hubport', p.hub_port || '');
  // New profiles default to tunnel; existing ones keep serve as the
  // empty-mode fallback to match the Go-side default (validateSSH).
  setVal('f-ssh-mode', p.mode || (isNew ? 'tunnel' : 'serve'));
  setVal('f-host', p.host || '');
  setVal('f-user', p.user || '');
  setVal('f-ssh-port', p.ssh_port || '');
  setVal('f-identity', p.identity_file || '');
  setVal('f-ssh-hubport', p.hub_port || '');
  setVal('f-ssh-binary', p.binary || '');
  setVal('f-ssh-cwd', p.cwd || '');
  setVal('f-token-cmd', p.token_command || '');

  syncTypeSections();
  syncSSHModeSections();

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function setVal(id, v) {
  const el = document.getElementById(id);
  if (el) el.value = v;
}
function getVal(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}
function getInt(id) {
  const v = parseInt(getVal(id), 10);
  return isNaN(v) ? 0 : v;
}

function syncTypeSections() {
  const t = getVal('f-type');
  document.getElementById('sec-wsl').style.display = t === 'wsl' ? '' : 'none';
  document.getElementById('sec-ssh').style.display = t === 'ssh' ? '' : 'none';
}

function syncSSHModeSections() {
  const m = getVal('f-ssh-mode');
  document.getElementById('sec-ssh-serve').style.display = m === 'serve' ? '' : 'none';
  document.getElementById('sec-ssh-tunnel').style.display = m === 'tunnel' ? '' : 'none';
}

// --------------------------------------------------------------------------
// Save profile from modal
// --------------------------------------------------------------------------
async function saveModal() {
  const name = getVal('f-name');
  if (!name) { alert(t('alert_name_required')); return; }
  const type = getVal('f-type');

  let profile = {name, type};

  if (type === 'wsl') {
    if (getVal('f-distro')) profile.distro = getVal('f-distro');
    if (getVal('f-wsl-binary')) profile.binary = getVal('f-wsl-binary');
    if (getVal('f-wsl-cwd')) profile.cwd = getVal('f-wsl-cwd');
    const hp = getInt('f-wsl-hubport');
    if (hp) profile.hub_port = hp;
  } else {
    const mode = getVal('f-ssh-mode');
    profile.mode = mode;
    profile.host = getVal('f-host');
    if (!profile.host) { alert(t('alert_host_required')); return; }
    if (getVal('f-user')) profile.user = getVal('f-user');
    const sp = getInt('f-ssh-port');
    if (sp) profile.ssh_port = sp;
    if (getVal('f-identity')) profile.identity_file = getVal('f-identity');
    const hp = getInt('f-ssh-hubport');
    if (hp) profile.hub_port = hp;

    if (mode === 'serve') {
      if (getVal('f-ssh-binary')) profile.binary = getVal('f-ssh-binary');
      if (getVal('f-ssh-cwd')) profile.cwd = getVal('f-ssh-cwd');
    } else {
      const tc = getVal('f-token-cmd');
      if (!tc) { alert(t('alert_token_required')); return; }
      profile.token_command = tc;
      if (!hp) { alert(t('alert_tunnel_port_required')); return; }
    }
  }

  // Build the new list.
  let newList;
  if (editingIdx < 0) {
    newList = [...profiles, profile];
  } else {
    newList = profiles.map((p, i) => i === editingIdx ? profile : p);
  }

  try {
    await apiFetch('/api/profiles', {
      method: 'POST',
      body: JSON.stringify({profiles: newList}),
    });
    closeModal();
    await loadProfiles();
    // Re-select the saved profile.
    const newIdx = newList.findIndex(p => p.name === name);
    if (newIdx >= 0) { selectedIdx = newIdx; renderTable(); }
    hideStatus();
  } catch (e) {
    alert(t('alert_save_failed', {message: e.message}));
  }
}

// --------------------------------------------------------------------------
// Event wiring
// --------------------------------------------------------------------------
document.getElementById('lang-select').addEventListener('change', e => setLanguage(e.target.value));
document.getElementById('btn-connect').addEventListener('click', startConnect);
document.getElementById('btn-reconnect').addEventListener('click', reconnect);
document.getElementById('btn-new').addEventListener('click', () => openModal(-1));
document.getElementById('btn-edit').addEventListener('click', () => { if (selectedIdx >= 0) openModal(selectedIdx); });
document.getElementById('btn-delete').addEventListener('click', deleteSelected);
document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
document.getElementById('btn-modal-save').addEventListener('click', saveModal);
document.getElementById('btn-stop-cancel').addEventListener('click', closeStopModal);
document.getElementById('f-type').addEventListener('change', () => { syncTypeSections(); syncSSHModeSections(); });
document.getElementById('f-ssh-mode').addEventListener('change', syncSSHModeSections);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === document.getElementById('modal-overlay')) closeModal(); });
document.getElementById('stop-modal-overlay').addEventListener('click', e => { if (e.target === document.getElementById('stop-modal-overlay')) closeStopModal(); });

// Keyboard shortcuts: Enter in table area triggers connect, Escape closes modal.
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeStopModal(); }
  if (e.key === 'Enter' && !isAnyModalOpen() && document.activeElement === document.body && selectedIdx >= 0) startConnect();
});

// --------------------------------------------------------------------------
// Init
// --------------------------------------------------------------------------
applyI18n();
loadProfiles();

})();
</script>
</body>
</html>
