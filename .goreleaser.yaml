version: 2

project_name: many-ai-cli

# Windows リソース (.syso) はタグ版数で都度生成する。git に commit 済みの
# .syso に依存せず、リリースごとに {{.Version}} を winres に焼き込むことで
# exe のファイルプロパティ (FileVersion/ProductVersion) をタグへ自動追従させる。
# 前提:
#   - .syso は .gitignore 済み・git 追跡外（追跡したままだと生成でツリーが汚れ
#     goreleaser のクリーンツリー検証に失敗する）。
#   - go-winres は before hooks で都度 install するため CI に事前準備は不要。
before:
  hooks:
    # `bun --cwd web run build` は goreleaser hook 内で no-op になり（web/dist が
    # 空のまま go build され `//go:embed all:dist` が失敗）、before.hooks は
    # map 形式(dir:)も非対応。Release workflow は ubuntu 上で走るため sh -c で
    # web へ cd し、Validate と同じく素の bun install/build を実行する。
    - sh -c 'cd web && bun install --frozen-lockfile && bun run build'
    - go install github.com/tc-hib/go-winres@latest
    - go-winres make --in winres/winres.json --out cmd/many-ai-cli/rsrc --product-version={{ .Version }} --file-version={{ .Version }}
    - go-winres make --in winres/winres-launcher.json --out cmd/many-ai-cli-launcher/rsrc --product-version={{ .Version }} --file-version={{ .Version }}

builds:
  - id: many-ai-cli
    main: ./cmd/many-ai-cli
    binary: many-ai-cli
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
      - goos: linux
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.gitCommit={{ .ShortCommit }}
      - -X main.buildTime={{ .Date }}
  - id: many-ai-cli-launcher
    main: ./cmd/many-ai-cli-launcher
    binary: many-ai-cli-launcher
    # Cross-platform: the launcher's SSH serve/tunnel profiles work on Windows,
    # Linux, and macOS; WSL profiles error gracefully off Windows. The build
    # matrix mirrors the main binary so every release archive ships both
    # binaries. windows/arm64 and linux/arm64 stay excluded (same as main).
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
      - goos: linux
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - id: default
    formats: [zip]
    # 全 OS で many-ai-cli + many-ai-cli-launcher の 2 本を同梱する
    # （windows は .exe ペア）。windows/arm64・linux/arm64 を ignore している
    # 都合で platform 間のバイナリ数が揃わないケースを許可しておく。
    allow_different_binary_count: true
    # エンドユーザー向けに OS/arch 名を分かりやすく:
    #   darwin/amd64 -> macos-intel, darwin/arm64 -> macos-apple-silicon
    #   windows/amd64 -> windows-x64, linux/amd64 -> linux-x64
    name_template: '{{ .ProjectName }}-{{ .Version }}-{{ if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}-{{ if eq .Os "darwin" }}{{ if eq .Arch "amd64" }}intel{{ else if eq .Arch "arm64" }}apple-silicon{{ else }}{{ .Arch }}{{ end }}{{ else }}{{ if eq .Arch "amd64" }}x64{{ else }}{{ .Arch }}{{ end }}{{ end }}'
    files:
      - README.md
      - README.ja.md
      - CHANGELOG.md
      - LICENSE
      - THIRD_PARTY_NOTICES.md
      - web/src/vendor/THIRD_PARTY_LICENSES.txt
      # Windows archives include a local Mark-of-the-Web helper next to the .exe files.
      # Other OS archives resolve this template to a non-matching glob.
      - '{{ if eq .Os "windows" }}unblock-windows.cmd{{ else }}__no_windows_unblock_file__*{{ end }}'

checksum:
  name_template: "SHA256SUMS.txt"
  algorithm: sha256

# SBOM (Software Bill of Materials): 各アーカイブの依存一覧を SPDX JSON で生成する。
# 利用者が Grype 等の脆弱性スキャナにかけられるようにするサプライチェーン透明性対策。
# syft は release.yml の anchore/sbom-action/download-syft でインストールする。
sboms:
  - artifacts: archive

signs:
  - artifacts: checksum
    cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"

# Homebrew 自前 tap への cask 公開（macOS amd64/arm64）。
# 当初は formula(brews) で macOS + Linux 両対応の予定だったが、brews は
# v2.16 で hard deprecation（release 実行が失敗）のため cask に変更。
# cask は macOS 専用につき、Linux ユーザーは下の nfpms(deb/rpm) か zip を使う
# （plan_package-manager-distribution.md C1 の分岐決定 2026-06-07）。
homebrew_casks:
  - name: many-ai-cli
    ids: [default]
    repository:
      owner: ishizakahiroshi
      name: homebrew-tap
      branch: main
      token: "{{ .Env.PUBLISH_GITHUB_TOKEN }}"
    homepage: https://github.com/ishizakahiroshi/many-ai-cli
    description: "Web dashboard to manage approvals and progress across multiple AI coding CLIs"
    license: MIT
    # prerelease タグ (-rc 等) では tap へ push しない
    skip_upload: auto
    # バイナリは未署名・未公証のため、quarantine 属性を post-install で除去する
    # （これがないと初回実行時に Gatekeeper にブロックされる）
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/many-ai-cli"]
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/many-ai-cli-launcher"]
          end

# winget への manifest 公開（Windows x64、zip + nested portable）。
# 自分の winget-pkgs fork へ commit し、microsoft/winget-pkgs master へ自動 PR。
# fork は release.yml の sync ステップで upstream と同期してから使う。
winget:
  - name: many-ai-cli
    publisher: ishizakahiroshi
    # 後から実質変更不可。本名名義で長期運用（2026-06-07 ユーザー確定）
    package_identifier: ishizakahiroshi.many-ai-cli
    short_description: "Web dashboard to manage approvals and progress across multiple AI coding CLIs"
    license: MIT
    license_url: https://github.com/ishizakahiroshi/many-ai-cli/blob/main/LICENSE
    homepage: https://github.com/ishizakahiroshi/many-ai-cli
    publisher_url: https://github.com/ishizakahiroshi
    publisher_support_url: https://github.com/ishizakahiroshi/many-ai-cli/issues
    release_notes_url: https://github.com/ishizakahiroshi/many-ai-cli/releases/tag/v{{ .Version }}
    # prerelease タグでは manifest を push しない
    skip_upload: auto
    repository:
      owner: ishizakahiroshi
      name: winget-pkgs
      branch: "many-ai-cli-{{ .Version }}"
      token: "{{ .Env.PUBLISH_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        draft: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

# Linux 向け deb/rpm を生成し GitHub Releases に添付する（apt/yum リポジトリ運営はしない）。
nfpms:
  - package_name: many-ai-cli
    ids: [many-ai-cli, many-ai-cli-launcher]
    vendor: ishizakahiroshi
    maintainer: "Hiroshi Ishizaka <ishizakahiroshi.dev@gmail.com>"
    homepage: https://github.com/ishizakahiroshi/many-ai-cli
    description: Web dashboard to manage approvals and progress across multiple AI coding CLIs
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin

# リリースノートは release.yml が CHANGELOG.md の該当版節を抽出し --release-notes で
# 渡す。コミットメッセージ由来の自動 changelog は Git タブ自動生成コミット
# （internal/hub/git_commit.go の subjectLine）の羅列で読めないため無効化する。
changelog:
  disable: true

release:
  draft: false
  prerelease: auto
