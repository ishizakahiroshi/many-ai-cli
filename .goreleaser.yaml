version: 2

project_name: any-ai-cli

# Windows リソース (.syso) はタグ版数で都度生成する。git に commit 済みの
# .syso に依存せず、リリースごとに {{.Version}} を winres に焼き込むことで
# exe のファイルプロパティ (FileVersion/ProductVersion) をタグへ自動追従させる。
# 前提:
#   - .syso は .gitignore 済み・git 追跡外（追跡したままだと生成でツリーが汚れ
#     goreleaser のクリーンツリー検証に失敗する）。
#   - go-winres は before hooks で都度 install するため CI に事前準備は不要。
before:
  hooks:
    - go install github.com/tc-hib/go-winres@latest
    - go-winres make --in winres/winres.json --out cmd/any-ai-cli/rsrc --product-version={{ .Version }} --file-version={{ .Version }}
    - go-winres make --in winres/winres-wsl.json --out cmd/any-ai-cli-wsl/rsrc --product-version={{ .Version }} --file-version={{ .Version }}
    - go-winres make --in winres/winres-launcher.json --out cmd/any-ai-cli-launcher/rsrc --product-version={{ .Version }} --file-version={{ .Version }}

builds:
  - id: any-ai-cli
    main: ./cmd/any-ai-cli
    binary: any-ai-cli
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
      - goos: linux
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
  - id: any-ai-cli-wsl
    main: ./cmd/any-ai-cli-wsl
    binary: any-ai-cli-wsl
    goos:
      - windows
    goarch:
      - amd64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
  - id: any-ai-cli-launcher
    main: ./cmd/any-ai-cli-launcher
    binary: any-ai-cli-launcher
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - id: default
    formats: [zip]
    # Windows だけ any-ai-cli.exe + any-ai-cli-wsl.exe の 2 本、他 OS は 1 本。
    # platform 間でバイナリ数が異なる構成を許可する。
    allow_different_binary_count: true
    # エンドユーザー向けに OS/arch 名を分かりやすく:
    #   darwin/amd64 -> macos-intel, darwin/arm64 -> macos-apple-silicon
    #   windows/amd64 -> windows-x64, linux/amd64 -> linux-x64
    name_template: '{{ .ProjectName }}-{{ .Version }}-{{ if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}-{{ if eq .Os "darwin" }}{{ if eq .Arch "amd64" }}intel{{ else if eq .Arch "arm64" }}apple-silicon{{ else }}{{ .Arch }}{{ end }}{{ else }}{{ if eq .Arch "amd64" }}x64{{ else }}{{ .Arch }}{{ end }}{{ end }}'
    files:
      - README.md
      - README.ja.md
      - CHANGELOG.md
      - LICENSE
      - THIRD_PARTY_NOTICES.md
      - web/src/vendor/THIRD_PARTY_LICENSES.txt

checksum:
  name_template: "SHA256SUMS.txt"
  algorithm: sha256

signs:
  - artifacts: checksum
    cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
